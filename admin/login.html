<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luxury Stay Admin Login</title>
  <meta name="theme-color" content="#f3efe7" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./css/admin.css" />

<style id="admin-inline-shell">
:root {
  --bg: #f3efe7;
  --panel: rgba(255,255,255,0.86);
  --panel-strong: #fff;
  --line: rgba(34, 26, 18, 0.10);
  --text: #211912;
  --muted: #6f665c;
  --accent: #9a4a36;
  --accent-2: #b95b46;
  --sand: #dcc7aa;
  --olive: #74826d;
  --shadow: 0 18px 50px rgba(52, 40, 28, 0.11);
  --shadow-soft: 0 10px 28px rgba(52, 40, 28, 0.08);
  --radius-xl: 28px;
  --radius-lg: 22px;
  --radius-md: 16px;
  --sidebar-width: 288px;
  --content-max: 1560px;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 15% 10%, rgba(255, 90, 95, 0.12), transparent 28%),
    radial-gradient(circle at 86% 3%, rgba(104, 128, 113, 0.14), transparent 26%),
    linear-gradient(180deg, #f9f4ed 0%, var(--bg) 100%);
  overflow-x: hidden;
  position: relative;
  isolation: isolate;
}
body::before,
body::after {
  content: "";
  position: fixed;
  border-radius: 999px;
  filter: blur(64px);
  pointer-events: none;
  opacity: .46;
  z-index: 0;
}
body::before {
  width: 340px;
  height: 340px;
  top: -120px;
  left: -120px;
  background: rgba(255, 90, 95, .17);
}
body::after {
  width: 280px;
  height: 280px;
  top: 16%;
  right: -90px;
  background: rgba(104, 128, 113, .17);
}

img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button, input, select, textarea { font: inherit; }
button { cursor: pointer; }

.bg-orb {
  position: fixed;
  border-radius: 999px;
  filter: blur(60px);
  pointer-events: none;
  opacity: .35;
  z-index: 0;
}
.orb-a { width: 340px; height: 340px; top: -120px; left: -120px; background: rgba(255,90,95,.18); }
.orb-b { width: 280px; height: 280px; top: 18%; right: -90px; background: rgba(104,128,113,.17); }
.orb-c { width: 260px; height: 260px; bottom: 10%; left: 20%; background: rgba(220,200,174,.22); }

.admin-app {
  min-height: 100vh;
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
}

.admin-sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: auto;
  padding: 22px 18px;
  border-right: 1px solid rgba(34, 26, 18, 0.08);
  background: rgba(255,255,255,.66);
  backdrop-filter: blur(18px) saturate(150%);
  -webkit-backdrop-filter: blur(18px) saturate(150%);
  box-shadow: 12px 0 40px rgba(52,40,28,.04);
}

.admin-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 20px;
  background: rgba(255,255,255,.72);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-soft);
}
.admin-brand-mark {
  width: 44px;
  height: 44px;
  border-radius: 16px;
  display: grid;
  place-items: center;
  background: linear-gradient(135deg, var(--accent), #bc6952);
  color: #fff;
  font-weight: 900;
  box-shadow: 0 10px 20px rgba(155,74,54,.22);
}
.admin-brand strong { display: block; line-height: 1.1; font-size: 1.02rem; }
.admin-brand small { display: block; margin-top: 2px; color: var(--muted); }

.admin-nav { display: grid; gap: 8px; margin-top: 18px; }
.admin-nav a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 16px;
  color: var(--text);
  font-weight: 800;
  letter-spacing: -.01em;
  border: 1px solid transparent;
  transition: background .18s ease, border-color .18s ease, transform .18s ease;
}
.admin-nav a i { width: 18px; color: var(--accent); }
.admin-nav a:hover,
.admin-nav a.active {
  background: rgba(155,74,54,.08);
  border-color: rgba(155,74,54,.14);
  transform: translateX(2px);
}
.admin-nav .nav-group-label {
  margin: 12px 14px 2px;
  font-size: .76rem;
  font-weight: 900;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
}
.admin-sidebar-footer {
  margin-top: 18px;
  padding: 14px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.74);
  box-shadow: var(--shadow-soft);
}
.admin-sidebar-footer p { margin: 0; color: var(--muted); line-height: 1.55; font-size: .94rem; }

.admin-main {
  min-width: 0;
  padding: 18px 22px 28px;
}

.admin-topbar {
  position: sticky;
  top: 14px;
  z-index: 15;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin: 0 auto 18px;
  max-width: var(--content-max);
  padding: 14px 16px;
  border: 1px solid rgba(34, 26, 18, 0.08);
  border-radius: 24px;
  background: rgba(255,255,255,.86);
  backdrop-filter: blur(18px) saturate(150%);
  -webkit-backdrop-filter: blur(18px) saturate(150%);
  box-shadow: 0 14px 36px rgba(52, 40, 28, 0.08);
}
.admin-topbar h1 { margin: 0; font-size: 1.18rem; line-height: 1.15; }
.admin-topbar p { margin: 3px 0 0; color: var(--muted); font-size: .92rem; }
.admin-topbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 42px;
  padding: 11px 16px;
  border-radius: 999px;
  border: 1px solid transparent;
  font-weight: 800;
  white-space: nowrap;
  transition: transform .18s ease, background .18s ease, color .18s ease, border-color .18s ease, box-shadow .18s ease;
}
.btn:hover { transform: translateY(-1px); }
.btn-primary {
  color: #fff;
  background: linear-gradient(135deg, var(--accent), #bb644c);
  box-shadow: 0 16px 28px rgba(155,74,54,.18);
}
.btn-primary:hover { background: linear-gradient(135deg, var(--accent-2), #c56d55); }
.btn-secondary {
  color: var(--text);
  background: rgba(255,255,255,.86);
  border-color: var(--line);
}
.btn-secondary:hover { border-color: rgba(155,74,54,.18); }
.btn-ghost {
  color: var(--text);
  background: rgba(34,26,18,.04);
  border-color: var(--line);
}
.btn-danger {
  color: #a43f39;
  background: rgba(163, 63, 57, .07);
  border-color: rgba(163, 63, 57, .16);
}
.btn.full { width: 100%; }
.btn.small { min-height: 36px; padding: 9px 12px; font-size: .86rem; }

.admin-content {
  max-width: var(--content-max);
  margin: 0 auto;
  display: grid;
  gap: 18px;
}
.admin-section {
  display: grid;
  gap: 14px;
  scroll-margin-top: 92px;
}
.section-head { display: flex; justify-content: space-between; gap: 14px; align-items: flex-end; }
.section-head span {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 11px;
  border-radius: 999px;
  background: rgba(155,74,54,.10);
  border: 1px solid rgba(155,74,54,.18);
  color: var(--accent);
  font-size: .78rem;
  font-weight: 900;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.section-head h2 { margin: 10px 0 0; font-size: clamp(1.6rem, 2.6vw, 2.55rem); line-height: 1.05; letter-spacing: -.04em; }
.section-head p { margin: 10px 0 0; max-width: 72ch; color: var(--muted); line-height: 1.6; }

.grid-2, .grid-4, .kpi-grid {
  display: grid;
  gap: 14px;
}
.grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid-4, .kpi-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }

.panel, .login-card, .dialog, .table-wrap, .card-stack > *, .kpi-card, .media-card, .review-card, .setting-card {
  border-radius: 24px;
  border: 1px solid var(--line);
  background: var(--panel);
  box-shadow: var(--shadow);
  backdrop-filter: blur(16px) saturate(140%);
  -webkit-backdrop-filter: blur(16px) saturate(140%);
}
.panel, .login-card { padding: 18px; }

.kpi-card {
  padding: 18px;
  display: grid;
  gap: 8px;
}
.kpi-card .label {
  font-size: .78rem;
  font-weight: 900;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--muted);
}
.kpi-card strong {
  display: block;
  font-size: clamp(1.6rem, 3vw, 2.3rem);
  line-height: 1;
  letter-spacing: -.05em;
}
.kpi-card p { margin: 0; color: var(--muted); line-height: 1.5; }

.quick-links {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.card-stack {
  display: grid;
  gap: 10px;
}
.card-stack > * { padding: 14px 16px; }
.card-stack strong { display: block; margin-bottom: 4px; }
.card-stack p { margin: 0; color: var(--muted); line-height: 1.55; }

.table-wrap {
  padding: 0;
  overflow: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 960px;
}
th, td {
  padding: 14px 12px;
  border-bottom: 1px solid rgba(34, 26, 18, 0.08);
  text-align: left;
  vertical-align: top;
}
th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: rgba(247,242,234,.96);
  color: var(--muted);
  font-size: .76rem;
  text-transform: uppercase;
  letter-spacing: .08em;
}
tbody tr:hover { background: rgba(155,74,54,.04); }

.field, .admin-form label, .form-grid label {
  display: grid;
  gap: 7px;
  color: var(--text);
  font-weight: 800;
}
input, select, textarea {
  width: 100%;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.92);
  border-radius: 16px;
  padding: 12px 14px;
  outline: none;
  color: var(--text);
}
textarea { min-height: 104px; resize: vertical; }
input:focus, select:focus, textarea:focus {
  border-color: rgba(155,74,54,.28);
  box-shadow: 0 0 0 4px rgba(155,74,54,.10);
}
.form-grid { display: grid; gap: 12px; }
.form-grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.form-grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.field.span-2 { grid-column: 1 / -1; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 7px 10px;
  border-radius: 999px;
  font-size: .76rem;
  font-weight: 900;
  letter-spacing: .04em;
  text-transform: uppercase;
  border: 1px solid transparent;
}
.badge.info { color: #2f5c54; background: rgba(112, 171, 162, .14); border-color: rgba(112, 171, 162, .22); }
.badge.success { color: #4f6a38; background: rgba(153, 188, 104, .14); border-color: rgba(153, 188, 104, .22); }
.badge.warning { color: #8a5a24; background: rgba(232, 184, 98, .16); border-color: rgba(232, 184, 98, .22); }
.badge.blocked { color: #93403a; background: rgba(204, 120, 110, .14); border-color: rgba(204, 120, 110, .20); }
.badge.reserved { color: #4c5d7c; background: rgba(128, 152, 210, .15); border-color: rgba(128, 152, 210, .22); }
.dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  display: inline-block;
  background: currentColor;
}
.muted { color: var(--muted); }

.calendar-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 8px;
}
.calendar-grid .day, .calendar-grid .month-cell {
  min-height: 92px;
  padding: 10px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.86);
}
.calendar-grid .month-cell { display: grid; gap: 6px; }
.calendar-grid .month-cell.available { background: rgba(153,188,104,.10); }
.calendar-grid .month-cell.reserved { background: rgba(128,152,210,.12); }
.calendar-grid .month-cell.blocked { background: rgba(204,120,110,.12); }

.media-grid,
.reviews-scroll,
.list-grid {
  display: grid;
  gap: 12px;
}
.media-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
.reviews-scroll { max-height: 560px; overflow: auto; padding-right: 4px; }

.admin-form {
  display: grid;
  gap: 12px;
}
.section-actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 10px;
}

.dialog, .modal-backdrop {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 18px;
  background: rgba(20, 15, 11, 0.48);
  backdrop-filter: blur(8px);
  z-index: 1000;
}
.dialog.open, .modal-backdrop.open { display: flex; }
.dialog-card {
  width: min(96vw, 980px);
  max-height: 90vh;
  overflow: auto;
  padding: 20px;
  border-radius: 28px;
  border: 1px solid rgba(255,255,255,.82);
  background: rgba(255,255,255,.96);
  box-shadow: 0 24px 80px rgba(0,0,0,.22);
}
.dialog-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 38px;
  height: 38px;
  border: 0;
  border-radius: 999px;
  background: rgba(34,26,18,.06);
  color: var(--text);
  display: grid;
  place-items: center;
}
.dialog-actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 10px;
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  color: var(--muted);
}
.legend .item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 11px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.76);
}

.login-shell {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  position: relative;
  z-index: 1;
}
.login-card {
  width: min(92vw, 460px);
  padding: 22px;
}
.brand-line {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.brand-line .mark {
  width: 46px;
  height: 46px;
  border-radius: 16px;
  display: grid;
  place-items: center;
  font-weight: 900;
  color: #fff;
  background: linear-gradient(135deg, var(--accent), #bc6952);
  box-shadow: 0 10px 20px rgba(155,74,54,.22);
}
.login-card h1 { margin: 0 0 10px; font-size: 2rem; letter-spacing: -.04em; }
.login-card p { margin: 0 0 16px; color: var(--muted); line-height: 1.6; }

@media (max-width: 1180px) {
  .admin-app { grid-template-columns: 1fr; }
  .admin-sidebar {
    position: relative;
    height: auto;
    width: 100%;
  }
  .admin-main { padding-top: 0; }
  .grid-2, .grid-4, .kpi-grid, .form-grid.cols-2, .form-grid.cols-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 820px) {
  .admin-topbar {
    position: static;
    flex-direction: column;
    align-items: flex-start;
  }
  .admin-topbar-actions { width: 100%; }
  .admin-topbar-actions .btn { flex: 1 1 calc(50% - 5px); }
  .section-head { flex-direction: column; align-items: flex-start; }
  .grid-2, .grid-4, .kpi-grid, .form-grid.cols-2, .form-grid.cols-3 { grid-template-columns: 1fr; }
  .btn { width: 100%; }
  .section-actions { justify-content: stretch; }
  .section-actions .btn { flex: 1 1 100%; }
}
</style>

</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-orb orb-c"></div>
  <main class="login-shell">
    <section class="login-card">
      <div class="brand-line">
        <div class="mark">LS</div>
        <div>
          <strong>Luxury Stay</strong>
          <span class="muted">Admin access portal</span>
        </div>
      </div>
      <h1>Owner login</h1>
      <p>Enter the hidden password to open the management dashboard.</p>
      <form id="adminLoginForm" class="admin-form">
        <label class="field">Password
          <input id="adminPassword" type="password" autocomplete="current-password" placeholder="Enter password" required />
        </label>
        <button class="btn btn-primary full" type="submit">Sign in</button>
      </form>
    </section>
  </main>

  <script src="./js/store.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>
