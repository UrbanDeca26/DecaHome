<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luxury Stay Admin Login</title>
  <meta name="theme-color" content="#f3efe7" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body>
  <main class="login-shell">
    <section class="login-card">
      <div class="brand-line">
        <div class="mark">LS</div>
        <div>
          <strong>Luxury Stay</strong>
          <span class="muted">Admin access portal</span>
        </div>
      </div>
      <h1>Owner login</h1>
      <p>Enter the hidden password to open the management dashboard.</p>
      <form id="adminLoginForm" class="admin-form">
        <label class="field">Password
          <input id="adminPassword" type="password" autocomplete="current-password" placeholder="Enter password" required />
        </label>
        <button class="btn btn-primary full" type="submit">Sign in</button>
      </form>
    </section>
  </main>

  <script src="./js/store.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>
