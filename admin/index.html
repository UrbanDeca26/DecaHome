<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luxury Stay Admin</title>
  <meta name="theme-color" content="#f3efe7" />
  <meta http-equiv="refresh" content="0; url=./login.html" />
  <style>
    :root { color-scheme: light; }
    html, body { height: 100%; }
    body {
      margin: 0;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(255, 90, 95, 0.12), transparent 28%),
        radial-gradient(circle at 86% 3%, rgba(104, 128, 113, 0.14), transparent 26%),
        linear-gradient(180deg, #f9f4ed 0%, #f3efe7 100%);
      color: #211912;
    }
    .card {
      width: min(92vw, 460px);
      padding: 24px;
      border-radius: 24px;
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(34, 26, 18, 0.10);
      box-shadow: 0 18px 50px rgba(52, 40, 28, 0.11);
      text-align: center;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      font-weight: 900;
    }
    .brand-mark {
      width: 44px; height: 44px; border-radius: 16px; display: grid; place-items: center;
      background: linear-gradient(135deg, #9a4a36, #bc6952); color: #fff; box-shadow: 0 10px 20px rgba(155,74,54,.22);
    }
    h1 { margin: 0; font-size: 1.5rem; }
    p { margin: 10px 0 0; color: #6f665c; line-height: 1.6; }
    a { color: #9a4a36; font-weight: 800; }
  </style>
  <script>
    window.location.replace('./login.html');
  </script>
</head>
<body>
  <main class="card" aria-label="Admin login redirect">
    <div class="brand"><span class="brand-mark">LS</span><span>Luxury Stay Admin</span></div>
    <h1>Redirecting to admin login…</h1>
    <p>If you are not redirected automatically, <a href="./login.html">open the login page</a>.</p>
  </main>
</body>
</html>
